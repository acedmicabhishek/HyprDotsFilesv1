# --- Modern Window Rules (Corrected) ---

# Fix 1: Added '1' to float and center (mandatory now)
windowrule = match:class ^(floating_nmtui)$, float 1, size 600 400, center 1

# Fix 2: Removed 'blur' and 'ignorealpha' (invalid window rules)
# Note: If global blur is on, setting opacity below 1.0 will auto-blur.
windowrule = match:class ^(wofi)$, opacity 0.9

# Fix 3: Removed invalid effects for Chrome
windowrule = match:class ^(google-chrome-stable)$, opacity 0.9 0.85

# Fix 4: Added '1' to float and center
windowrule = match:class ^(nm-connection-editor)$, float 1, size 600 500, center 1

# Make F12 terminal float (kitty --class floating_terminal)
windowrule = match:class ^(floating_terminal)$, float 1, size 800 500, center 1
