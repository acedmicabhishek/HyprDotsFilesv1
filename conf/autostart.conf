# --- Autostart ---
exec-once = swww-daemon
exec-once = swayosd-server
exec-once = ~/.config/hypr/scripts/wallpaper_rotator.sh
exec-once = LD_PRELOAD=/usr/lib/libgtk4-layer-shell.so python3 ~/.config/hypr/scripts/ace_bar.py & disown

# --- Fonts (Apply to GTK) ---
exec-once = gsettings set org.gnome.desktop.interface font-name 'JetBrainsMono Nerd Font 11'
exec-once = gsettings set org.gnome.desktop.interface monospace-font-name 'JetBrainsMono Nerd Font 10'